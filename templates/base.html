<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frutería Papus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-image: url('/static/Fondo.png');
            background-size: 100% auto;
            background-position: bottom center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-color: #ffffff;
        }
        .navbar { background-color: #2e7d32 !important; }
        .main-container {
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            margin-bottom: 25vh;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <img src="/static/Fruteria.jpeg" alt="Logo" width="40" height="40" class="me-2">
            FRUTERÍA PAPUS
        </a>
        <div class="ms-auto">
            {% if session.user %}
                <span class="navbar-text text-white me-3">Hola, {{ session.user }}</span>
                <a href="/inventario" class="btn btn-warning btn-sm fw-bold me-2">INVENTARIO</a>
                <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
            {% else %}
                <a href="/login" class="btn btn-light btn-sm me-2">Entrar</a>
                <a href="/registro" class="btn btn-light btn-sm me-2">Crear Cuenta</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
