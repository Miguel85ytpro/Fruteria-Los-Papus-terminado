<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frutería Papus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #2e7d32; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FRUTERÍA PAPUS</a>
        <div class="ms-auto">
            {% if session.user %}
                <span class="navbar-text text-white me-3">Hola, {{ session.user }}</span>
                <a href="/inventario" class="btn btn-warning btn-sm fw-bold me-2">INVENTARIO</a>
                <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
            {% else %}
                <a href="/login" class="btn btn-light btn-sm me-2">Entrar</a>
                <a href="/registro" class="btn btn-light btn-sm me-2">Crear Cuenta</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
