{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm mb-4">
            <h5 class="fw-bold">Agregar Nueva Fruta</h5>
            <form action="/inventario/agregar" method="POST">
                <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre" required>
                <input type="number" step="0.01" name="precio" class="form-control mb-2" placeholder="Precio KG" required>
                <input type="number" step="0.1" name="stock" class="form-control mb-2" placeholder="Cantidad KG" required>
                <select name="estado" class="form-select mb-3">
                    <option value="Maduro">Maduro</option>
                    <option value="Verde">Verde</option>
                    <option value="Agotado">Agotado</option>
                    <option value="Caducado">Caducado</option>
                </select>
                <button type="submit" class="btn btn-success w-100">Guardar</button>
            </form>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-3 shadow-sm">
            <h5 class="fw-bold mb-3">LISTA DETALLADA</h5>
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Fruta</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in productos %}
                    <tr>
                        <td>{{ p.nombre }}</td>
                        <td>${{ p.precio_kg }}</td>
                        <td>{{ p.stock }} KG</td>
                        <td>{{ p.estado }}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#edit{{ p._id }}">Editar</button>
                        </td>
                    </tr>

                    <div class="modal fade" id="edit{{ p._id }}" tabindex="-1">
                        <div class="modal-dialog">
                            <form action="/inventario/editar/{{ p._id }}" method="POST" class="modal-content">
                                <div class="modal-header"><h5>Editar {{ p.nombre }}</h5></div>
                                <div class="modal-body">
                                    <label>Precio:</label>
                                    <input type="number" step="0.01" name="precio" class="form-control mb-2" value="{{ p.precio_kg }}">
                                    <label>Stock:</label>
                                    <input type="number" step="0.1" name="stock" class="form-control mb-2" value="{{ p.stock }}">
                                    <label>Estado:</label>
                                    <select name="estado" class="form-select">
                                        <option value="Maduro" {% if p.estado == 'Maduro' %}selected{% endif %}>Maduro</option>
                                        <option value="Verde" {% if p.estado == 'Verde' %}selected{% endif %}>Verde</option>
                                        <option value="Agotado" {% if p.estado == 'Agotado' %}selected{% endif %}>Agotado</option>
                                        <option value="Caducado" {% if p.estado == 'Caducado' %}selected{% endif %}>Caducado</option>
                                    </select>
                                </div>
                                <div class="modal-footer">
                                    <button type="submit" class="btn btn-primary">Actualizar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
