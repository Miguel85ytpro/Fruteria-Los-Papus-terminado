{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 bg-white p-4 border rounded shadow-sm">
        <h3 class="text-center mb-4">Nueva Contraseña</h3>
        <p class="text-center text-muted small">Restableciendo contraseña para el correo: <strong>{{ correo }}</strong></p>
        
        <form action="/restablecer-proceso" method="POST">
            <input type="hidden" name="correo" value="{{ correo }}">
            <input type="hidden" name="token" value="{{ token }}">
            
            <div class="mb-3">
                <label class="form-label">Nueva Contraseña</label>
                <input type="password" name="password" class="form-control" required minlength="4">
            </div>
            <button type="submit" class="btn btn-success w-100">Actualizar Contraseña</button>
        </form>
    </div>
</div>
{% endblock %}
